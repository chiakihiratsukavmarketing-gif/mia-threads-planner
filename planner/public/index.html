<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <link rel="manifest" href="/manifest.json" />
    <title>Threads Planner</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --blue: #2563eb;
        --green: #16a34a;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #111827;
        color: #fff;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      header .title {
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      header .sub {
        font-size: 12px;
        opacity: 0.85;
        margin-top: 2px;
      }
      main {
        padding: 14px 14px 96px;
        max-width: 980px;
        margin: 0 auto;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        margin: 12px 0 14px;
      }
      .tabs {
        display: inline-flex;
        gap: 8px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
      }
      .tab {
        border: none;
        background: transparent;
        padding: 10px 12px;
        border-radius: 10px;
        font-weight: 800;
        cursor: pointer;
        color: var(--muted);
      }
      .tab.active {
        background: #111827;
        color: #fff;
      }
      .btn {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        padding: 10px 12px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn.primary {
        border-color: #1d4ed8;
        background: var(--blue);
        color: #fff;
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .hint {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        margin: 10px 0;
        box-shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
      .row.left {
        justify-content: flex-start;
      }
      .iconbtn {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        padding: 8px 10px;
        border-radius: 10px;
        font-weight: 800;
        cursor: pointer;
      }
      .iconbtn.danger {
        border-color: #fecaca;
        background: #fff;
        color: #991b1b;
      }
      .iconbtn.green {
        border-color: #bbf7d0;
        background: #f0fdf4;
        color: #166534;
      }
      .badge {
        font-size: 12px;
        font-weight: 800;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
      }
      .badge.scheduled {
        color: #1d4ed8;
        border-color: #bfdbfe;
        background: #eff6ff;
      }
      .badge.posted {
        color: #166534;
        border-color: #bbf7d0;
        background: #f0fdf4;
      }
      .badge.failed {
        color: #991b1b;
        border-color: #fecaca;
        background: #fef2f2;
      }
      .badge.hidden {
        display: none;
      }
      .time {
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }
      textarea {
        width: 100%;
        min-height: 92px;
        resize: vertical;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 10px;
        font-size: 14px;
        line-height: 1.5;
        box-sizing: border-box;
      }
      .meta {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-top: 10px;
      }
      @media (min-width: 860px) {
        .meta {
          grid-template-columns: 1fr 1fr;
        }
      }
      label {
        font-size: 12px;
        color: var(--muted);
        display: block;
        margin-bottom: 6px;
        font-weight: 700;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 10px;
        font-size: 14px;
      }
      select {
        width: 100%;
        box-sizing: border-box;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 10px;
        font-size: 14px;
        background: #fff;
      }
      .fab {
        position: fixed;
        right: 16px;
        bottom: 16px;
        width: 54px;
        height: 54px;
        border-radius: 999px;
        border: none;
        background: #111827;
        color: #fff;
        font-size: 28px;
        line-height: 0;
        cursor: pointer;
        box-shadow: 0 18px 40px rgba(17, 24, 39, 0.25);
      }
      pre.err {
        white-space: pre-wrap;
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #991b1b;
        padding: 10px;
        border-radius: 12px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="title">Threads Planner</div>
        <div class="sub" id="dayLabel">—</div>
      </div>
      <button class="btn" id="btnToday" type="button">Today</button>
    </header>

    <main>
      <div class="toolbar">
        <div>
          <div class="tabs" role="tablist" aria-label="views">
            <button class="tab active" id="tabCreate" type="button">新規作成</button>
            <button class="tab" id="tabDrafts" type="button">下書き</button>
            <button class="tab" id="tabScheduled" type="button">予約済み</button>
            <button class="tab" id="tabDone" type="button">配信完了</button>
          </div>
          <button class="btn" id="btnPrev" type="button">←</button>
          <button class="btn" id="btnNext" type="button">→</button>
        </div>
        <div style="display: flex; gap: 10px; align-items: center">
          <button class="btn" id="btnReload" type="button">再読込</button>
          <button class="btn primary" id="btnSave" type="button" disabled>保存</button>
        </div>
      </div>
      <div class="card" id="composer">
        <div class="row">
          <div style="font-weight: 800">生成（テーマ/型/メモ）</div>
          <div class="hint">生成→確認→「下書きに追加」で下書きに入れます</div>
        </div>
        <div class="meta">
          <div>
            <label>テーマ</label>
            <input id="cmpTopic" placeholder="例: 育児と仕事の両立" />
          </div>
          <div>
            <label>投稿の型</label>
            <input id="cmpType" list="postTypes" placeholder="例: 逆説型" />
            <datalist id="postTypes">
              <option value="暴露型"></option>
              <option value="数字型"></option>
              <option value="逆説型"></option>
              <option value="共感型"></option>
              <option value="実績型"></option>
              <option value="スレッド型"></option>
            </datalist>
          </div>
          <div style="grid-column: 1 / -1">
            <label>方向性メモ（任意）</label>
            <input id="cmpMemo" placeholder="例: 初期の段階でドカンと大きな利益を得る…" />
          </div>
          <div style="grid-column: 1 / -1">
            <label>生成された文章（編集OK）</label>
            <textarea id="cmpOut" placeholder="ここに生成結果が入ります"></textarea>
            <div class="hint" id="cmpCount"></div>
          </div>
          <div style="grid-column: 1 / -1">
            <label><input type="checkbox" id="cmpThread" /> ツリー投稿として生成（複数投稿）</label>
            <div class="hint">ONにすると、生成結果は複数投稿になり「下書き」へまとめて追加されます</div>
          </div>
          <div class="row" style="grid-column: 1 / -1; justify-content: flex-end">
            <button class="btn" id="btnGen" type="button">生成</button>
            <button class="btn primary" id="btnAddDraft" type="button">下書きに追加</button>
          </div>
        </div>
      </div>
      <div id="errorBox" style="display: none; margin-top: 12px"></div>
      <div id="list"></div>
    </main>

    <button class="fab" id="btnAdd" type="button" title="追加">+</button>

    <script>
      const $ = (id) => document.getElementById(id);

      /** @type {{version:number, posts:any[]} | null} */
      let state = null;
      let dirty = false;
      /** @type {"create"|"drafts"|"scheduled"|"done"} */
      let viewMode = "create";
      /** @type {string} YYYY-MM-DD (local) */
      function localYmdNow() {
        const dt = new Date();
        return `${dt.getFullYear()}-${pad2(dt.getMonth() + 1)}-${pad2(dt.getDate())}`;
      }
      let day = localYmdNow();

      function setError(msg) {
        const box = $("errorBox");
        if (!msg) {
          box.style.display = "none";
          box.textContent = "";
          return;
        }
        box.style.display = "block";
        box.innerHTML = `<pre class="err"></pre>`;
        box.querySelector("pre").textContent = msg;
      }

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function localDateLabel(ymd) {
        const [y, m, d] = ymd.split("-").map((x) => parseInt(x, 10));
        const dt = new Date(y, m - 1, d);
        const w = ["日", "月", "火", "水", "木", "金", "土"][dt.getDay()];
        return `${y}/${m}/${d}（${w}）`;
      }

      function bumpDay(delta) {
        const [y, m, d] = day.split("-").map((x) => parseInt(x, 10));
        const dt = new Date(y, m - 1, d + delta);
        day = `${dt.getFullYear()}-${pad2(dt.getMonth() + 1)}-${pad2(dt.getDate())}`;
        $("dayLabel").textContent = `${localDateLabel(day)} · LOCAL`;
        void render();
      }

      function statusBadge(status) {
        const s = String(status || "").toLowerCase();
        if (s === "posted") return `投稿済`;
        if (s === "posting") return `配信中`;
        if (s === "failed") return `失敗`;
        return `予約`;
      }

      function statusBadgeClass(status) {
        const s = String(status || "").toLowerCase();
        if (s === "posted") return "posted";
        if (s === "posting") return "scheduled";
        if (s === "failed") return "failed";
        return "scheduled";
      }

      function applyBadgeEl(badgeEl, post) {
        if (!badgeEl || !post) return;
        const st = String(post.status || "").toLowerCase();
        if (st === "draft" || dirty) {
          badgeEl.textContent = "";
          badgeEl.className = "badge hidden";
          return;
        }
        badgeEl.textContent = statusBadge(post.status);
        badgeEl.className = `badge ${statusBadgeClass(post.status)}`;
      }

      function postDayKey(scheduledAt) {
        // scheduled_at is ISO; derive local calendar day
        const dt = new Date(scheduledAt);
        if (Number.isNaN(dt.getTime())) return "";
        return `${dt.getFullYear()}-${pad2(dt.getMonth() + 1)}-${pad2(dt.getDate())}`;
      }

      function timeLabel(scheduledAt) {
        const dt = new Date(scheduledAt);
        if (Number.isNaN(dt.getTime())) return "—";
        return `${pad2(dt.getHours())}:${pad2(dt.getMinutes())}`;
      }

      async function apiGet() {
        const res = await fetch("/api/queue", { method: "GET" });
        const text = await res.text();
        if (!res.ok) throw new Error(text || `HTTP ${res.status}`);
        return JSON.parse(text);
      }

      async function apiPut(payload) {
        const res = await fetch("/api/queue", {
          method: "PUT",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        const text = await res.text();
        if (!res.ok) throw new Error(text || `HTTP ${res.status}`);
        return JSON.parse(text);
      }

      async function apiGenerate(payload) {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        const text = await res.text();
        if (!res.ok) throw new Error(text || `HTTP ${res.status}`);
        return JSON.parse(text);
      }

      function uid() {
        return `p_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      }

      function setBusy(btn, busy, busyLabel) {
        if (!btn) return;
        if (!btn.dataset) btn.dataset = {};
        if (busy) {
          btn.dataset.origText = btn.textContent || "";
          btn.textContent = busyLabel;
          btn.disabled = true;
        } else {
          btn.textContent = btn.dataset.origText || btn.textContent;
          btn.disabled = false;
        }
      }

      function markDirty(v) {
        dirty = v;
        $("btnSave").disabled = !dirty;
        document.querySelectorAll(".card[data-idx]").forEach((card) => {
          const globalIdx = parseInt(card.getAttribute("data-idx"), 10);
          const badgeEl = card.querySelector("[data-role='badge']");
          const p = state && state.posts ? state.posts[globalIdx] : null;
          if (!p) return;
          applyBadgeEl(badgeEl, p);
        });
      }

      async function reload() {
        setError("");
        setBusy($("btnReload"), true, "更新中…");
        try {
          state = await apiGet();
          dirty = false;
          markDirty(false);
          await render();
        } catch (e) {
          setError(String(e && e.message ? e.message : e));
        } finally {
          setBusy($("btnReload"), false, "");
        }
      }

      async function save() {
        setError("");
        setBusy($("btnSave"), true, "保存中…");
        try {
          // Normalize legacy Zulu timestamps so the runner can parse them.
          const payload = JSON.parse(JSON.stringify(state || { version: 1, posts: [] }));
          for (const p of payload.posts || []) {
            if (p && typeof p.scheduled_at === "string" && p.scheduled_at.endsWith("Z")) {
              p.scheduled_at = p.scheduled_at.replace(/Z$/, "+00:00");
            }
          }
          const saved = await apiPut(payload);
          state = saved;
          dirty = false;
          markDirty(false);
          await render();
        } catch (e) {
          markDirty(true);
          setError(String(e && e.message ? e.message : e));
        } finally {
          setBusy($("btnSave"), false, "");
        }
      }

      function getLocalParts(iso) {
        const dt = iso ? new Date(iso) : null;
        if (!dt || Number.isNaN(dt.getTime())) return { date: day, time: "12:00" };
        const d = `${dt.getFullYear()}-${pad2(dt.getMonth() + 1)}-${pad2(dt.getDate())}`;
        const t = `${pad2(dt.getHours())}:${pad2(dt.getMinutes())}`;
        return { date: d, time: t };
      }

      function toIsoFromLocal(dateStr, timeStr) {
        const [y, m, d] = String(dateStr).split("-").map((x) => parseInt(x, 10));
        const [hh, mm] = String(timeStr).split(":").map((x) => parseInt(x, 10));
        const dt = new Date(y, m - 1, d, hh || 0, mm || 0, 0);
        // Store with local offset (e.g. +09:00) to avoid confusion
        const offMin = -dt.getTimezoneOffset();
        const sign = offMin >= 0 ? "+" : "-";
        const abs = Math.abs(offMin);
        const oh = pad2(Math.floor(abs / 60));
        const om = pad2(abs % 60);
        const yyyy = dt.getFullYear();
        const mo = pad2(dt.getMonth() + 1);
        const da = pad2(dt.getDate());
        const ho = pad2(dt.getHours());
        const mi = pad2(dt.getMinutes());
        return `${yyyy}-${mo}-${da}T${ho}:${mi}:00${sign}${oh}:${om}`;
      }

      function bindCard(card, globalIdx) {
        const schedDate = card.querySelector(".in-date");
        const schedTime = card.querySelector(".in-time");
        const st = card.querySelector(".in-status");
        const tx = card.querySelector(".in-text");
        const timeEl = card.querySelector(".time");
        const badgeEl = card.querySelector("[data-role='badge']");
        const delBtn = card.querySelector(".btn-del");
        const postNowBtn = card.querySelector(".btn-post-now");

        const syncDerived = () => {
          const p = state.posts[globalIdx];
          if (String(p.status || "").toLowerCase() === "draft") {
            timeEl.textContent = "下書き";
          } else {
            timeEl.textContent = timeLabel(p.scheduled_at);
          }
          applyBadgeEl(badgeEl, p);
        };

        if (schedDate && schedTime) {
          const apply = () => {
            const p = state.posts[globalIdx];
            p.scheduled_at = toIsoFromLocal(schedDate.value, schedTime.value);
            markDirty(true);
            syncDerived();
          };
          schedDate.addEventListener("input", apply);
          schedTime.addEventListener("input", apply);
        }
        st.addEventListener("change", () => {
          state.posts[globalIdx].status = st.value;
          markDirty(true);
          syncDerived();
        });
        tx.addEventListener("input", () => {
          const p = state.posts[globalIdx];
          p.text = tx.value;
          if (Array.isArray(p.thread) && p.thread.length > 0) {
            p.thread[0] = tx.value;
          }
          markDirty(true);
        });

        card.querySelectorAll(".in-thread").forEach((el) => {
          el.addEventListener("input", () => {
            const p = state.posts[globalIdx];
            const idx = parseInt(el.getAttribute("data-tidx"), 10);
            if (!Array.isArray(p.thread)) {
              p.thread = [String(p.text || ""), ""];
            }
            p.thread[idx] = el.value;
            markDirty(true);
          });
        });

        if (delBtn) {
          delBtn.addEventListener("click", () => {
            if (!state) return;
            const ok = window.confirm("この投稿を削除しますか？（元に戻せません）");
            if (!ok) return;
            state.posts.splice(globalIdx, 1);
            markDirty(true);
            void render();
          });
        }

        if (postNowBtn) {
          postNowBtn.addEventListener("click", async () => {
            try {
              setError("");
              if (!state) throw new Error("まだ読み込み中です");
              const p = state.posts[globalIdx];
              const st0 = String(p.status || "").toLowerCase();
              if (st0 !== "draft") throw new Error("下書きのみ即投稿できます");
              const text = String(p.text || "").trim();
              if (!text) throw new Error("text が空です");
              if (text.length > 500) throw new Error("text が500字を超えています");

              const ok = window.confirm("この下書きを今すぐ投稿しますか？\n（まずキューを保存→その後、投稿ワークフローを起動します）");
              if (!ok) return;

              // Convert draft -> pending now, and persist immediately.
              const now = new Date();
              const iso = toIsoFromLocal(
                `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())}`,
                `${pad2(now.getHours())}:${pad2(Math.floor(now.getMinutes() / 5) * 5)}`,
              );
              p.scheduled_at = iso;
              p.status = "pending";
              p.last_error = null;
              markDirty(true);
              syncDerived();
              await save();

              // Best-effort: trigger Actions immediately to avoid waiting for cron.
              postNowBtn.disabled = true;
              postNowBtn.textContent = "起動中…";
              const res = await fetch("/api/dispatch", { method: "POST" });
              const t = await res.text();
              if (!res.ok) throw new Error(t || `dispatch HTTP ${res.status}`);
              postNowBtn.textContent = "起動OK";
              setTimeout(() => void reload(), 1200);
            } catch (e) {
              setError(String(e && e.message ? e.message : e));
              try {
                postNowBtn.disabled = false;
                postNowBtn.textContent = "即投稿";
              } catch {}
            }
          });
        }
      }

      async function render() {
        $("dayLabel").textContent = `${localDateLabel(day)} · LOCAL`;
        const list = $("list");
        if (!state) {
          list.innerHTML = `<div class="card">読み込み中…</div>`;
          return;
        }

        // show composer only on "create"
        $("composer").style.display = viewMode === "create" ? "block" : "none";

        const all = state.posts || [];
        const countDrafts = all.filter((p) => String(p.status || "").toLowerCase() === "draft").length;
        const countScheduled = all.filter((p) => {
          const st = String(p.status || "").toLowerCase();
          return (st === "pending" || st === "posting" || st === "failed") && postDayKey(p.scheduled_at) === day;
        }).length;
        const countDone = all.filter(
          (p) => String(p.status || "").toLowerCase() === "posted" && postDayKey(p.scheduled_at) === day,
        ).length;

        $("tabDrafts").textContent = `下書き${countDrafts ? " (" + countDrafts + ")" : ""}`;
        $("tabScheduled").textContent = `予約済み${countScheduled ? " (" + countScheduled + ")" : ""}`;
        $("tabDone").textContent = `配信完了${countDone ? " (" + countDone + ")" : ""}`;

        let posts = all;
        if (viewMode === "drafts") {
          posts = posts.filter((p) => String(p.status || "").toLowerCase() === "draft");
        } else if (viewMode === "scheduled") {
          posts = posts.filter((p) => {
            const st = String(p.status || "").toLowerCase();
            return (st === "pending" || st === "posting" || st === "failed") && postDayKey(p.scheduled_at) === day;
          });
          posts.sort((a, b) => String(a.scheduled_at).localeCompare(String(b.scheduled_at)));
        } else if (viewMode === "done") {
          posts = posts.filter(
            (p) => String(p.status || "").toLowerCase() === "posted" && postDayKey(p.scheduled_at) === day,
          );
          posts.sort((a, b) => String(a.scheduled_at).localeCompare(String(b.scheduled_at)));
        } else {
          // create tab: show nothing in list area (composer only)
          posts = [];
        }

        if (posts.length === 0) {
          if (viewMode === "create") {
            list.innerHTML = "";
            return;
          }
          list.innerHTML = viewMode === "drafts"
            ? `<div class="card"><div class="hint">下書きはありません。「新規作成」タブから追加できます。</div></div>`
            : viewMode === "done"
              ? `<div class="card"><div class="hint">この日の配信完了はありません。</div></div>`
              : `<div class="card"><div class="hint">この日の予約はありません。右下の「＋」で追加できます。</div></div>`;
          return;
        }

        list.innerHTML = posts
          .map((p, idx) => {
            const globalIdx = state.posts.indexOf(p);
            const parts = getLocalParts(p.scheduled_at);
            const isDraft = String(p.status || "").toLowerCase() === "draft";
            return `
            <div class="card" data-idx="${globalIdx}">
              <div class="row">
                <div class="row left" style="gap: 12px; align-items: center;">
                  <div class="time">${String(p.status || "").toLowerCase() === "draft" ? "下書き" : timeLabel(p.scheduled_at)}</div>
                  <span class="badge scheduled" data-role="badge"></span>
                </div>
                <div class="row left" style="gap: 8px;">
                  ${isDraft ? `<button class="iconbtn green btn-post-now" type="button">即投稿</button>` : ""}
                  <button class="iconbtn danger btn-del" type="button">削除</button>
                </div>
              </div>
              <div class="meta">
                <div>
                  <label>日付（カレンダー）</label>
                  <input class="in-date" type="date" value="${parts.date}" />
                </div>
                <div>
                  <label>時刻（5分刻み）</label>
                  <input class="in-time" type="time" step="300" value="${parts.time}" />
                </div>
                <div>
                  <label>status</label>
                  <select class="in-status">
                    ${["draft","pending","posting","posted","failed"].map(s=>`<option value="${s}" ${String(p.status||"").toLowerCase()===s?"selected":""}>${s}</option>`).join("")}
                  </select>
                </div>
                <div style="grid-column: 1 / -1">
                  <label>text（500字以内）</label>
                  <textarea class="in-text">${String(p.text || "")}</textarea>
                </div>
                ${
                  Array.isArray(p.thread) && p.thread.length > 1
                    ? `
                <div style="grid-column: 1 / -1">
                  <label>ツリー（2投稿目以降）</label>
                  <div class="hint">各パートは500字以内。投稿時は順番に返信として送られます。</div>
                  ${p.thread
                    .slice(1)
                    .map(
                      (t, i) =>
                        `<textarea class="in-thread" data-tidx="${i + 1}" placeholder="${i + 2}投稿目">${String(
                          t || "",
                        )}</textarea>`,
                    )
                    .join("")}
                </div>`
                    : ""
                }
              </div>
            </div>`;
          })
          .join("");

        list.querySelectorAll(".card").forEach((card) => {
          const globalIdx = parseInt(card.getAttribute("data-idx"), 10);
          const wrap = card.querySelector("[data-role='badge']");
          applyBadgeEl(wrap, state.posts[globalIdx]);
          bindCard(card, globalIdx);
        });
      }

      $("btnReload").addEventListener("click", () => reload());
      $("btnSave").addEventListener("click", () => save());
      $("btnPrev").addEventListener("click", () => bumpDay(-1));
      $("btnNext").addEventListener("click", () => bumpDay(1));
      $("btnToday").addEventListener("click", () => {
        day = localYmdNow();
        void render();
      });
      function setActiveTab() {
        for (const id of ["tabCreate","tabDrafts","tabScheduled","tabDone"]) {
          $(id).classList.remove("active");
        }
        if (viewMode === "create") $("tabCreate").classList.add("active");
        if (viewMode === "drafts") $("tabDrafts").classList.add("active");
        if (viewMode === "scheduled") $("tabScheduled").classList.add("active");
        if (viewMode === "done") $("tabDone").classList.add("active");
      }
      $("tabCreate").addEventListener("click", () => {
        viewMode = "create";
        setActiveTab();
        void render();
      });
      $("tabDrafts").addEventListener("click", () => {
        viewMode = "drafts";
        setActiveTab();
        void render();
      });
      $("tabScheduled").addEventListener("click", () => {
        viewMode = "scheduled";
        setActiveTab();
        void render();
      });
      $("tabDone").addEventListener("click", () => {
        viewMode = "done";
        setActiveTab();
        void render();
      });

      function updateComposerCount() {
        const out = $("cmpOut").value || "";
        $("cmpCount").textContent = `文字数: ${out.length} / 500`;
      }

      $("cmpOut").addEventListener("input", updateComposerCount);

      $("btnGen").addEventListener("click", async () => {
        try {
          setError("");
          setBusy($("btnGen"), true, "生成中…");
          const topic = ($("cmpTopic").value || "").trim();
          const post_type = ($("cmpType").value || "").trim();
          const memo = ($("cmpMemo").value || "").trim();
          const thread = Boolean($("cmpThread").checked);
          if (!topic) throw new Error("テーマが空です");
          if (!post_type) throw new Error("投稿の型が空です（例: 逆説型）");
          const res = await apiGenerate({ topic, post_type, memo, thread });
          if (thread) {
            $("cmpOut").value = Array.isArray(res.parts) ? res.parts.join("\n\n---\n\n") : "";
          } else {
            $("cmpOut").value = String(res.text || "");
          }
          updateComposerCount();
        } catch (e) {
          setError(String(e && e.message ? e.message : e));
        } finally {
          setBusy($("btnGen"), false, "");
        }
      });

      $("btnAddDraft").addEventListener("click", () => {
        try {
          setError("");
          if (!state) throw new Error("まだ読み込み中です");
          const text = ($("cmpOut").value || "").trim();
          if (!text) throw new Error("生成された文章が空です");
          const thread = Boolean($("cmpThread").checked);
          const parts = thread ? text.split(/\n\s*---\s*\n/).map((s) => s.trim()).filter(Boolean) : [text];
          if (parts.some((p) => p.length > 500)) throw new Error("500字を超える投稿が含まれています");

          state.posts.push({
            id: uid(),
            scheduled_at: null,
            status: "draft",
            text: parts[0],
            thread: parts.length > 1 ? parts : null,
            attempts: 0,
            threads_post_id: null,
            last_error: null,
            posted_at: null,
            updated_at: null,
          });

          markDirty(true);
          void render();
        } catch (e) {
          setError(String(e && e.message ? e.message : e));
        }
      });

      $("btnAdd").addEventListener("click", () => {
        if (!state) return;
        const now = new Date();
        // default: selected local day at now's clock time (user edits ISO anyway)
        const hh = pad2(now.getHours());
        const mm = pad2(Math.floor(now.getMinutes() / 5) * 5); // keep 5-min step
        const iso = toIsoFromLocal(day, `${hh}:${mm}`);
        state.posts.push({
          id: uid(),
          scheduled_at: iso,
          status: "pending",
          text: "",
          attempts: 0,
          threads_post_id: null,
          last_error: null,
          posted_at: null,
          updated_at: null,
        });
        markDirty(true);
        void render();
      });

      window.addEventListener("beforeunload", (e) => {
        if (!dirty) return;
        e.preventDefault();
        e.returnValue = "";
      });

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      }

      bumpDay(0);
      reload();
    </script>
  </body>
</html>
